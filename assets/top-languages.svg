<svg xmlns="http://www.w3.org/2000/svg" width="495" height="195" viewBox="0 0 495 195" fill="none" role="img" aria-labelledby="title">
  <title id="title">Top Languages — Glenn Watson</title>
  <style>
    .header { font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif; fill: #70a5fd; }
    .lang   { font: 400 12px 'Segoe UI', Ubuntu, Sans-Serif; fill: #38bdae; }
    .pct    { font: 600 12px 'Segoe UI', Ubuntu, Sans-Serif; fill: #38bdae; }
    .footer { font: 400 11px 'Segoe UI', Ubuntu, Sans-Serif; fill: #a9b1d6; opacity: 0.65; }
  </style>

  <rect width="494" height="194" x="0.5" y="0.5" rx="4.5" fill="#1a1b27" stroke="#38bdae"/>

  <text x="25" y="35" class="header">Most Used Languages</text>

  <!-- stacked bar -->
  <g transform="translate(25,55)">
    <mask id="bar-mask">
      <rect width="445" height="8" rx="4" fill="white"/>
    </mask>
    <g mask="url(#bar-mask)">
      <rect x="0"      width="379.6" height="8" fill="#178600"/> <!-- C# 85.3% -->
      <rect x="379.6"  width="21.4"  height="8" fill="#f1e05a"/> <!-- JS 4.8% -->
      <rect x="401.0"  width="16.0"  height="8" fill="#3178c6"/> <!-- TS 3.6% -->
      <rect x="417.0"  width="10.2"  height="8" fill="#3572A5"/> <!-- Python 2.3% -->
      <rect x="427.2"  width="8.5"   height="8" fill="#c6538c"/> <!-- SCSS 1.9% -->
      <rect x="435.7"  width="5.8"   height="8" fill="#e34c26"/> <!-- HTML 1.3% -->
      <rect x="441.5"  width="3.5"   height="8" fill="#563d7c"/> <!-- other -->
    </g>
  </g>

  <!-- legend, 2 columns -->
  <g transform="translate(25,90)">
    <!-- column 1 -->
    <circle cx="6"  cy="6" r="5" fill="#178600"/>
    <text   x="18" y="10" class="lang">C#</text>
    <text   x="195" y="10" text-anchor="end" class="pct">85.3%</text>

    <circle cx="6"  cy="30" r="5" fill="#f1e05a"/>
    <text   x="18" y="34" class="lang">JavaScript</text>
    <text   x="195" y="34" text-anchor="end" class="pct">4.8%</text>

    <circle cx="6"  cy="54" r="5" fill="#3178c6"/>
    <text   x="18" y="58" class="lang">TypeScript</text>
    <text   x="195" y="58" text-anchor="end" class="pct">3.6%</text>

    <circle cx="6"  cy="78" r="5" fill="#3572A5"/>
    <text   x="18" y="82" class="lang">Python</text>
    <text   x="195" y="82" text-anchor="end" class="pct">2.3%</text>

    <!-- column 2 -->
    <circle cx="240" cy="6" r="5" fill="#c6538c"/>
    <text   x="252" y="10" class="lang">SCSS</text>
    <text   x="430" y="10" text-anchor="end" class="pct">1.9%</text>

    <circle cx="240" cy="30" r="5" fill="#e34c26"/>
    <text   x="252" y="34" class="lang">HTML</text>
    <text   x="430" y="34" text-anchor="end" class="pct">1.3%</text>

    <circle cx="240" cy="54" r="5" fill="#012456" stroke="#a9b1d6" stroke-width="0.5"/>
    <text   x="252" y="58" class="lang">PowerShell</text>
    <text   x="430" y="58" text-anchor="end" class="pct">0.3%</text>

    <circle cx="240" cy="78" r="5" fill="#563d7c"/>
    <text   x="252" y="82" class="lang">CSS</text>
    <text   x="430" y="82" text-anchor="end" class="pct">0.2%</text>
  </g>

  <text x="470" y="184" text-anchor="end" class="footer">across 45 public repos</text>
</svg>
